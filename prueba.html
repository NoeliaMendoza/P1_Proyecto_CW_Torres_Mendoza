<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Header</title>
        <style>
            /*///*/

            .hero {
                position: relative;
                height: 80vh;
                background-image:
                    linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
                    url('./src/images/fondo.png');
                background-size: cover;
                background-position: bottom;
                display: flex;
                align-items: center;
                padding: 0 48px;
            }

            .hero-content {
                position: relative;
                z-index: 1;
                max-width: 600px;
                display: flex;
                flex-direction: column;
                gap: 16px;
            }

            .hero-content h2 {
                font-size: 3rem;
                color: var(--color-leche);
                line-height: 1.2;
            }

            .hero-content p {
                color: var(--color-leche);
                line-height: 1.6;
                font-size: 18px;
            }

            .hero-btns {
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
                margin-top: 8px;
                font-size: 3rem;
            }

            .hero-btns a {
                text-decoration: none;
                padding: 12px 28px;
                border-radius: 8px;
                font-weight: 700;
                font-size: 1rem;
                transition: all 0.3s ease;
            }

            .hero-btns a {
                background-color: var(--color-caramelo);
                color: var(--color-leche);
            }

            .hero-btns a {
                background-color: var(--color-canela);
            }

            .hero-btns a:last-child {
                background-color: transparent;
                border: 2px solid rgba(255, 255, 255, 0.6);
            }

            .hero-btns a:last-child:hover {
                background-color: rgba(255, 255, 255, 0.15);
            }

            /******/
            .categorias-grid {
                padding: 2rem 4rem;
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 20px;
            }

            .categorias-titulo {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 2rem 4rem 0;
            }

            .btn-ver-mas {
                text-decoration: none;
                padding: 10px 24px;
                border-radius: 30px;
                background-color: var(--color-espresso);
                color: var(--color-leche);
                font-weight: 700;
                transition: background-color 0.3s ease;
            }

            .btn-ver-mas:hover {
                background-color: var(--color-canela);
            }
        </style>
    </head>
    <body>
        <section class="hero">
            <div class="hero-content">
                <h2>Marta's Coffee: Calidez en cada taza</h2>
                <p>
                    Descubre el sabor auténtico del café de especialidad en un ambiente diseñado
                    para tu pausa diaria.
                </p>
                <div class="hero-btns">
                    <a href="">Ver menú</a>
                    <a href="">Nuestra Historia</a>
                </div>
            </div>
        </section>
        <section>
            <div class="categorias-titulo">
                <h2>Nuestras Categorías</h2>
                <a class="btn-ver-mas" href="#menu">Ver menú completo</a>
            </div>
            <div class="categorias-grid">
                <div class="categoria-card">
                    <img
                        src="https://i.pinimg.com/736x/b3/c2/ca/b3c2cad3c7c54c458ce05ed7efb4e017.jpg"
                        alt=""
                    />
                    <div class="card-info">
                        <span>Café</span>
                    </div>
                </div>
                <div class="categoria-card">
                    <img
                        src="https://i.pinimg.com/736x/97/6f/e7/976fe7d600238d377e398a77cd45bd51.jpg"
                        alt=""
                    />
                    <div class="card-info">
                        <span>Bebidas Frías</span>
                    </div>
                </div>
                <div class="categoria-card">
                    <img
                        src="https://i.pinimg.com/1200x/91/43/f0/9143f0ffd9a32e20853564cc45a83150.jpg"
                        alt=""
                    />
                    <div class="card-info">
                        <span>Pasteles</span>
                    </div>
                </div>
                <div class="categoria-card">
                    <img
                        src="https://i.pinimg.com/736x/27/a8/4d/27a84dcfb3e55fb97f51c7211d48b822.jpg"
                        alt=""
                    />
                    <div class="card-info">
                        <span>Té</span>
                    </div>
                </div>
                <div class="categoria-card">
                    <img
                        src="https://i.pinimg.com/736x/27/a8/4d/27a84dcfb3e55fb97f51c7211d48b822.jpg"
                        alt=""
                    />
                    <div class="card-info">
                        <span>Té</span>
                    </div>
                </div>
                <div class="categoria-card">
                    <img
                        src="https://i.pinimg.com/736x/27/a8/4d/27a84dcfb3e55fb97f51c7211d48b822.jpg"
                        alt=""
                    />
                    <div class="card-info">
                        <span>Té</span>
                    </div>
                </div>
            </div>
        </section>
    </body>
</html>
